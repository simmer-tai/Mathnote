<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathNote - ライブラリ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body style="overflow: hidden;">
    <div class="library-layout">
        <!-- 左サイドバー -->
        <aside class="tag-sidebar">
            <div class="tag-sidebar-title">タグ</div>
            <ul id="tag-list">
                <li class="tag-item active" data-tag-id="all" onclick="filterByTag('all')">
                    <span class="tag-dot" style="background:#888"></span>
                    <span class="tag-name">すべて</span>
                </li>
                <!-- タグが動的に追加される -->
            </ul>
            <button id="create-tag-btn" onclick="createTag()">＋ タグを作成</button>
        </aside>

        <!-- 右メインエリア -->
        <main class="library-main">
            <header class="library-header">
                <h1 style="display: flex; align-items: center; gap: 12px; margin: 0;">
                    <i data-lucide="library" style="color: var(--primary-color);"></i>
                    MathNote ライブラリ
                </h1>
                <div class="search-bar-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input
                        type="text"
                        id="search-input"
                        class="search-input"
                        placeholder="ノートを検索..."
                        oninput="handleSearch(this.value)"
                    />
                </div>
                <button class="new-note-btn" onclick="createNewNote()">
                    <i data-lucide="plus"></i> 新規ノート作成
                </button>

                <!-- Firebase Auth Indicator -->
                <div id="auth-indicator" style="margin-left:12px;">
                    <button id="google-login-btn-lib" class="lib-login-btn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.svg" width="18" height="18" alt="Google">
                        ログイン
                    </button>
                    <div id="user-avatar-lib" class="user-avatar-lib hidden">
                        <img id="user-icon-lib" src="" alt="User" style="width:24px; height:24px; border-radius:50%;">
                        <span id="user-name-lib" style="font-size:13px; color:#555;"></span>
                        <button id="logout-btn-lib">ログアウト</button>
                    </div>
                </div>
            </header>

            <div id="library-grid" class="library-grid">
                <!-- カードがここに動的に生成されます -->
            </div>

            <div id="empty-state" class="hidden" style="text-align: center; padding: 100px 0; color: #888;">
                <i data-lucide="inbox" size="64" style="margin-bottom: 16px; opacity: 0.5;"></i>
                <p>保存されたノートがありません。<br>右上のボタンから新しく作成しましょう！</p>
            </div>
        </main>
    </div>

    <!-- タグドロップダウン -->
    <div class="tag-dropdown" id="tag-dropdown">
        <div class="tag-dropdown-columns" id="tag-dropdown-columns">
            <!-- ジャンルごとのカラムが動的生成される -->
        </div>
        <div class="tag-dropdown-footer">
            <button id="tag-dropdown-new" onclick="createTag()">＋ 新規タグ作成</button>
        </div>
    </div>

    <script src="library.js"></script>
    <!-- Firebase SDK (ES Module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWPFiAdIyj2rHKrKDXMU1DP4dxYMihlYA",
            authDomain: "mathnote-86595.firebaseapp.com",
            databaseURL: "https://mathnote-86595-default-rtdb.firebaseio.com",
            projectId: "mathnote-86595",
            storageBucket: "mathnote-86595.firebasestorage.app",
            messagingSenderId: "886174524589",
            appId: "1:886174524589:web:9562bc7ccd7dc52eea1224"
        };

        const app = initializeApp(firebaseConfig);
        window.firebaseDB = getDatabase(app);
        window.firebaseAuth = getAuth(app);
        window.GoogleAuthProvider = GoogleAuthProvider;
        window.signInWithPopup = signInWithPopup;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        // DB操作用
        window.firebaseRef = ref;
        window.firebaseSet = set;
        window.firebaseGet = get;
        window.firebaseChild = child;

        // Auth UI セットアップ（SDK確実ロード後に実行）
        function setupLibraryAuth() {
            const loginBtn = document.getElementById('google-login-btn-lib');
            const userAvatar = document.getElementById('user-avatar-lib');
            const userIcon = document.getElementById('user-icon-lib');
            const userName = document.getElementById('user-name-lib');
            const logoutBtn = document.getElementById('logout-btn-lib');

            if (loginBtn) loginBtn.onclick = () => {
                const provider = new GoogleAuthProvider();
                signInWithPopup(window.firebaseAuth, provider).catch(err => console.error(err));
            };
            if (logoutBtn) logoutBtn.onclick = () => {
                signOut(window.firebaseAuth).catch(err => console.error(err));
            };

            onAuthStateChanged(window.firebaseAuth, (user) => {
                if (user) {
                    if (loginBtn) loginBtn.classList.add('hidden');
                    if (userAvatar) {
                        userAvatar.classList.remove('hidden');
                        if (userIcon) userIcon.src = user.photoURL || '';
                        if (userName) userName.innerText = user.displayName || 'User';
                    }
                    if (typeof syncFromFirebase === 'function') {
                        syncFromFirebase();
                    }
                } else {
                    if (loginBtn) loginBtn.classList.remove('hidden');
                    if (userAvatar) userAvatar.classList.add('hidden');
                }
            });
        }

        // DOMが既にロード済みなら即実行、未ロードならイベント待機
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setupLibraryAuth);
        } else {
            setupLibraryAuth();
        }
    </script>
</body>
</html>
