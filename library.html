<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MathNote - ライブラリ</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body style="overflow: hidden;">
    <div class="library-layout">
        <!-- 左サイドバー -->
        <aside class="tag-sidebar">
            <div class="tag-sidebar-title">タグ</div>
            <ul id="tag-list">
                <li class="tag-item active" data-tag-id="all" onclick="filterByTag('all')">
                    <span class="tag-dot" style="background:#888"></span>
                    <span class="tag-name">すべて</span>
                </li>
                <!-- タグが動的に追加される -->
            </ul>
            <button id="create-tag-btn" onclick="createTag()">＋ タグを作成</button>
        </aside>

        <!-- 右メインエリア -->
        <main class="library-main">
            <header class="library-header">
                <h1 style="display: flex; align-items: center; gap: 12px; margin: 0;">
                    <i data-lucide="library" style="color: var(--primary-color);"></i>
                    MathNote ライブラリ
                </h1>
                <div class="search-bar-wrapper">
                    <i data-lucide="search" class="search-icon"></i>
                    <input
                        type="text"
                        id="search-input"
                        class="search-input"
                        placeholder="ノートを検索..."
                        oninput="handleSearch(this.value)"
                    />
                </div>
                <button class="new-note-btn" onclick="createNewNote()">
                    <i data-lucide="plus"></i> 新規ノート作成
                </button>

                <!-- Firebase Auth Indicator -->
                <div id="auth-indicator" style="margin-left:12px;">
                    <button id="google-login-btn-lib" class="lib-login-btn">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/layout/google.svg" width="18" height="18" alt="Google">
                        ログイン
                    </button>
                    <div id="user-avatar-lib" class="user-avatar-lib hidden">
                        <img id="user-icon-lib" src="" alt="User" style="width:24px; height:24px; border-radius:50%;">
                        <span id="user-name-lib" style="font-size:13px; color:#555;"></span>
                        <button id="logout-btn-lib">ログアウト</button>
                    </div>
                </div>
            </header>

            <div id="library-grid" class="library-grid">
                <!-- カードがここに動的に生成されます -->
            </div>

            <div id="empty-state" class="hidden" style="text-align: center; padding: 100px 0; color: #888;">
                <i data-lucide="inbox" size="64" style="margin-bottom: 16px; opacity: 0.5;"></i>
                <p>保存されたノートがありません。<br>右上のボタンから新しく作成しましょう！</p>
            </div>
        </main>
    </div>

    <!-- タグドロップダウン -->
    <div class="tag-dropdown" id="tag-dropdown">
        <div class="tag-dropdown-columns" id="tag-dropdown-columns">
            <!-- ジャンルごとのカラムが動的生成される -->
        </div>
        <div class="tag-dropdown-footer">
            <button id="tag-dropdown-new" onclick="createTag()">＋ 新規タグ作成</button>
        </div>
    </div>

    <script>
        let currentActiveTagId = 'all';
        let currentSearchQuery = '';

        function createNewNote() {
            window.location.href = 'index.html';
        }

        function initDefaultTags() {
            let existing = [];
            try {
                existing = JSON.parse(localStorage.getItem('mathnote_tags') || '[]');
                if (!Array.isArray(existing)) existing = [];
            } catch (e) {
                existing = [];
            }

            const needsMigration = existing.length === 0 || existing.some(t => !t.genre);
            
            if (needsMigration) {
                const defaultTags = [
                    { id: 'tag_math',    name: '数学',       color: '#89b4fa', genre: '科目' },
                    { id: 'tag_physics', name: '物理',       color: '#cba6f7', genre: '科目' },
                    { id: 'tag_chem',    name: '化学',       color: '#a6e3a1', genre: '科目' },
                    { id: 'tag_bio',     name: '生物',       color: '#94e2d5', genre: '科目' },
                    { id: 'tag_eng',     name: '英語',       color: '#f38ba8', genre: '科目' },
                    { id: 'tag_jpn',     name: '国語',       color: '#eba0ac', genre: '科目' },
                    { id: 'tag_hist',    name: '歴史',       color: '#e5c890', genre: '科目' },
                    { id: 'tag_geo',     name: '地理',       color: '#81c8be', genre: '科目' },
                    { id: 'tag_info',    name: '情報',       color: '#ef9f76', genre: '科目' },
                    { id: 'tag_imp',     name: '重要',       color: '#f38ba8', genre: 'ステータス' },
                    { id: 'tag_rev',     name: '復習必要',   color: '#f9e2af', genre: 'ステータス' },
                    { id: 'tag_test',    name: 'テスト範囲', color: '#cba6f7', genre: 'ステータス' },
                    { id: 'tag_done',    name: '完了',       color: '#a6e3a1', genre: 'ステータス' },
                    { id: 'tag_wip',     name: '未完成',     color: '#585b70', genre: 'ステータス' },
                ];

                // 既存のカスタムタグはgenre:'その他'として保持
                const customTags = existing.filter(t => !t.id.startsWith('tag_')).map(t => {
                    if (!t.genre) t.genre = 'その他';
                    return t;
                });

                // デフォルトタグとカスタムタグを結合して保存
                localStorage.setItem('mathnote_tags', JSON.stringify([...defaultTags, ...customTags]));
            }
        }

        function loadTags() {
            let tags = [];
            try {
                tags = JSON.parse(localStorage.getItem('mathnote_tags') || '[]');
                if (!Array.isArray(tags)) tags = [];
            } catch (e) { tags = []; }

            const tagList = document.getElementById('tag-list');
            
            // "すべて" 以外をクリア
            const allItem = tagList.querySelector('[data-tag-id="all"]');
            tagList.innerHTML = '';
            tagList.appendChild(allItem);

            tags.forEach(tag => {
                const li = document.createElement('li');
                li.className = `tag-item ${currentActiveTagId === tag.id ? 'active' : ''}`;
                li.dataset.tagId = tag.id;
                li.onclick = () => filterByTag(tag.id);
                li.oncontextmenu = (e) => {
                    e.preventDefault();
                    handleTagContextMenu(tag, e);
                };
                li.innerHTML = `
                    <span class="tag-dot" style="background:${tag.color}"></span>
                    <span class="tag-name">${tag.name}</span>
                `;
                tagList.appendChild(li);
            });
        }

        function filterByTag(tagId) {
            currentActiveTagId = tagId;
            document.querySelectorAll('.tag-item').forEach(el => {
                el.classList.toggle('active', el.dataset.tagId === tagId);
            });
            loadLibrary(tagId);
        }

        function loadLibrary(activeTagId = 'all') {
            let index = [];
            let tags = [];
            try {
                index = JSON.parse(localStorage.getItem('mathnote_index') || '[]');
                if (!Array.isArray(index)) index = [];
                tags = JSON.parse(localStorage.getItem('mathnote_tags') || '[]');
                if (!Array.isArray(tags)) tags = [];
            } catch (e) {
                index = []; tags = [];
            }
            const grid = document.getElementById('library-grid');
            const emptyState = document.getElementById('empty-state');

            // フィルタリング
            let filtered = index;
            if (activeTagId !== 'all') {
                filtered = index.filter(note => note.tags && note.tags.includes(activeTagId));
            }

            // テキスト検索フィルタ
            if (currentSearchQuery) {
                filtered = filtered.filter(note =>
                    (note.name || '').toLowerCase().includes(currentSearchQuery)
                );
            }

            // 更新日時で降順ソート
            filtered.sort((a, b) => b.updatedAt - a.updatedAt);

            if (filtered.length === 0 && index.length === 0) {
                emptyState.classList.remove('hidden');
                grid.classList.add('hidden');
                if (window.lucide) lucide.createIcons();
                return;
            } else {
                emptyState.classList.add('hidden');
                grid.classList.remove('hidden');
            }

            grid.innerHTML = '';
            filtered.forEach(note => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.dataset.noteId = note.id;
                
                // カード全体クリックでノートを開く（ヘッダーやタグボタンなどは除く）
                card.onclick = (e) => {
                    if (e.target.closest('.note-card-header') || e.target.closest('.tag-add-btn') || e.target.closest('.tag-badge')) return;
                    window.location.href = `index.html?id=${note.id}`;
                };

                const date = new Date(note.updatedAt).toLocaleString('ja-JP', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit'
                });

                // ヘッダー色の決定
                let headerColor = note.headerColor;
                if (!headerColor && note.tags && note.tags.length > 0) {
                    const firstTag = tags.find(t => t.id === note.tags[0]);
                    if (firstTag) headerColor = firstTag.color;
                }
                if (!headerColor) headerColor = '#e0e0e0';

                // ヘッダー生成
                const headerEl = document.createElement('div');
                headerEl.className = 'note-card-header';
                headerEl.style.background = headerColor;
                headerEl.addEventListener('click', (e) => {
                    e.stopPropagation(); // カード遷移を防ぐ
                    const colorInput = document.createElement('input');
                    colorInput.type = 'color';
                    colorInput.value = headerColor;
                    colorInput.addEventListener('change', (ce) => {
                        const newColor = ce.target.value;
                        // mathnote_indexのheaderColorを更新
                        let idxData = JSON.parse(localStorage.getItem('mathnote_index') || '[]');
                        const idx = idxData.findIndex(n => n.id === note.id);
                        if (idx !== -1) {
                            idxData[idx].headerColor = newColor;
                            localStorage.setItem('mathnote_index', JSON.stringify(idxData));
                        }
                        headerEl.style.background = newColor;
                    });
                    colorInput.click();
                });

                // ボディ生成
                const bodyEl = document.createElement('div');
                bodyEl.className = 'note-card-body';

                // タグバッジの生成
                let tagsHtml = '';
                if (note.tags) {
                    note.tags.forEach(tId => {
                        const t = tags.find(tag => tag.id === tId);
                        if (t) {
                            tagsHtml += `<span class="tag-badge" style="background:${t.color}" onclick="removeTagFromNote('${note.id}', '${t.id}', event)">${t.name}</span>`;
                        }
                    });
                }

                bodyEl.innerHTML = `
                    <div class="note-name">${note.name}</div>
                    <div class="note-date">最終更新: ${date}</div>
                    <div class="note-tags">
                        ${tagsHtml}
                        <button class="tag-add-btn" onclick="showTagDropdown('${note.id}', this)">＋</button>
                    </div>
                `;

                card.appendChild(headerEl);
                card.appendChild(bodyEl);
                grid.appendChild(card);
            });

            if (window.lucide) lucide.createIcons();
        }

        function handleSearch(query) {
            currentSearchQuery = query.trim().toLowerCase();
            loadLibrary(currentActiveTagId);
        }

        function createTag() {
            const name = window.prompt('タグ名を入力してください');
            if (!name) return;

            const genre = window.prompt('ジャンル名を入力してください（科目、ステータス、その他等）', 'その他') || 'その他';

            const colors = ['#f38ba8', '#fab387', '#f9e2af', '#a6e3a1', '#89b4fa', '#cba6f7'];
            const color = colors[Math.floor(Math.random() * colors.length)];

            const tags = JSON.parse(localStorage.getItem('mathnote_tags') || '[]');
            const newTag = {
                id: 'tag_' + Date.now().toString(36),
                name: name.trim(),
                color: color,
                genre: genre.trim()
            };
            tags.push(newTag);
            localStorage.setItem('mathnote_tags', JSON.stringify(tags));
            loadTags();
            
            // ドロップダウンが開いていれば更新
            const dropdown = document.getElementById('tag-dropdown');
            if (dropdown.style.display === 'block') {
                const noteId = dropdown.dataset.currentNoteId;
                showTagDropdown(noteId, null, true);
            }
        }

        function handleTagContextMenu(tag, e) {
            const action = window.prompt(`タグ「${tag.name}」の操作:\n1: 名前変更\n2: 削除\n(番号を入力してください)`);
            if (action === '1') {
                const newName = window.prompt('新しいタグ名', tag.name);
                if (newName) {
                    const tags = JSON.parse(localStorage.getItem('mathnote_tags') || '[]');
                    const idx = tags.findIndex(t => t.id === tag.id);
                    if (idx !== -1) {
                        tags[idx].name = newName;
                        localStorage.setItem('mathnote_tags', JSON.stringify(tags));
                        loadTags();
                        loadLibrary(currentActiveTagId);
                    }
                }
            } else if (action === '2') {
                if (window.confirm(`タグ「${tag.name}」を削除しますか？\nこのタグはすべてのノートから外されます。`)) {
                    deleteTag(tag.id);
                }
            }
        }

        function deleteTag(tagId) {
            let tags = JSON.parse(localStorage.getItem('mathnote_tags') || '[]');
            tags = tags.filter(t => t.id !== tagId);
            localStorage.setItem('mathnote_tags', JSON.stringify(tags));

            let index = JSON.parse(localStorage.getItem('mathnote_index') || '[]');
            index = index.map(note => {
                if (note.tags) {
                    note.tags = note.tags.filter(t => t !== tagId);
                }
                return note;
            });
            localStorage.setItem('mathnote_index', JSON.stringify(index));

            if (currentActiveTagId === tagId) currentActiveTagId = 'all';
            loadTags();
            loadLibrary(currentActiveTagId);
        }

        function showTagDropdown(noteId, anchorEl) {
            const dropdown = document.getElementById('tag-dropdown');
            const columnsEl = document.getElementById('tag-dropdown-columns');
            
            // 同じノートのドロップダウンが開いていれば閉じる
            if (dropdown.style.display === 'block' && dropdown.dataset.currentNoteId === noteId && anchorEl) {
                dropdown.style.display = 'none';
                return;
            }

            dropdown.dataset.currentNoteId = noteId;

            const index = JSON.parse(localStorage.getItem('mathnote_index') || '[]');
            const note = index.find(n => n.id === noteId);
            const noteTags = note ? (note.tags || []) : [];
            const tags = JSON.parse(localStorage.getItem('mathnote_tags') || '[]');

            // ジャンルの表示順を固定
            const genreOrder = ['科目', 'ステータス', 'その他'];
            const genres = {};
            genreOrder.forEach(g => genres[g] = []);

            tags.forEach(tag => {
                const g = tag.genre || 'その他';
                if (!genres[g]) genres[g] = [];
                genres[g].push(tag);
            });

            // カラム生成
            columnsEl.innerHTML = '';
            Object.entries(genres)
                .filter(([_, genreTags]) => genreTags.length > 0)
                .forEach(([genre, genreTags]) => {
                    const col = document.createElement('div');
                    col.className = 'tag-dropdown-column';
                    col.innerHTML = `<div class="tag-dropdown-column-title">${genre}</div>`;
                    
                    genreTags.forEach(tag => {
                        const isActive = noteTags.includes(tag.id);
                        const btn = document.createElement('button');
                        btn.className = 'tag-dropdown-item' + (isActive ? ' active' : '');
                        btn.style.setProperty('--tag-color', tag.color);
                        btn.innerHTML = `
                            <span class="tag-dot" style="background:${tag.color}"></span>
                            ${tag.name}
                            ${isActive ? '<span class="tag-check" style="margin-left:auto">✓</span>' : ''}
                        `;
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            toggleTagOnNote(noteId, tag.id);
                        });
                        col.appendChild(btn);
                    });
                    columnsEl.appendChild(col);
                });

            // 一旦visibility:hiddenで表示してサイズを取得してから位置を確定
            dropdown.style.visibility = 'hidden';
            dropdown.style.display = 'block';

            // 位置調整 (アンカーがある場合のみ)
            if (anchorEl) {
                const rect = anchorEl.getBoundingClientRect();
                const ddRect = dropdown.getBoundingClientRect();
                let top = rect.bottom + 4;
                let left = rect.left;
                
                // 画面外はみ出し防止
                if (top + ddRect.height > window.innerHeight) {
                    top = rect.top - ddRect.height - 4;
                }
                if (left + ddRect.width > window.innerWidth) {
                    left = window.innerWidth - ddRect.width - 8;
                }
                
                dropdown.style.top = `${top}px`;
                dropdown.style.left = `${left}px`;
            } else {
                // アンカーがない場合は直近の位置を維持するか、
                // あるいは中央などに表示する（ここでは位置を固定しない）
            }
            dropdown.style.visibility = 'visible';
        }

        function toggleTagOnNote(noteId, tagId) {
            const index = JSON.parse(localStorage.getItem('mathnote_index') || '[]');
            const noteIdx = index.findIndex(n => n.id === noteId);
            if (noteIdx === -1) return;

            if (!index[noteIdx].tags) index[noteIdx].tags = [];
            
            const tagIdx = index[noteIdx].tags.indexOf(tagId);
            if (tagIdx === -1) {
                index[noteIdx].tags.push(tagId);
            } else {
                index[noteIdx].tags.splice(tagIdx, 1);
            }

            localStorage.setItem('mathnote_index', JSON.stringify(index));
            
            // ドロップダウンをその場で更新（位置は維持）
            showTagDropdown(noteId, null);
            // カードのタグバッジだけ更新
            updateCardTags(noteId, index[noteIdx].tags);
        }

        function removeTagFromNote(noteId, tagId, e) {
            e.stopPropagation();
            const index = JSON.parse(localStorage.getItem('mathnote_index') || '[]');
            const noteIdx = index.findIndex(n => n.id === noteId);
            if (noteIdx !== -1 && index[noteIdx].tags) {
                index[noteIdx].tags = index[noteIdx].tags.filter(t => t !== tagId);
                localStorage.setItem('mathnote_index', JSON.stringify(index));
                
                // カードのタグバッジを更新
                updateCardTags(noteId, index[noteIdx].tags);
                // ドロップダウンが開いていれば更新
                const dropdown = document.getElementById('tag-dropdown');
                if (dropdown.style.display === 'block' && dropdown.dataset.currentNoteId === noteId) {
                    showTagDropdown(noteId, null);
                }
            }
        }

        function updateCardTags(noteId, tagIds) {
            const tags = JSON.parse(localStorage.getItem('mathnote_tags') || '[]');
            const card = document.querySelector(`.note-card[data-note-id="${noteId}"]`);
            if (!card) return;
            const tagsContainer = card.querySelector('.note-tags');
            if (!tagsContainer) return;

            // バッジだけ再生成（＋ボタンは残す）
            const addBtn = tagsContainer.querySelector('.tag-add-btn');
            tagsContainer.innerHTML = '';
            tagIds.forEach(tId => {
                const t = tags.find(tag => tag.id === tId);
                if (t) {
                    const badge = document.createElement('span');
                    badge.className = 'tag-badge';
                    badge.style.background = t.color;
                    badge.textContent = t.name;
                    badge.onclick = (ev) => removeTagFromNote(noteId, t.id, ev);
                    tagsContainer.appendChild(badge);
                }
            });
            if (addBtn) tagsContainer.appendChild(addBtn);
        }

        // ドロップダウンの外クリックで閉じる
        document.addEventListener('click', (e) => {
            const dropdown = document.getElementById('tag-dropdown');
            if (dropdown.style.display === 'block' && !dropdown.contains(e.target) && !e.target.closest('.tag-add-btn')) {
                dropdown.style.display = 'none';
            }
        });

        window.onload = () => {
            initDefaultTags();
            loadTags();
            loadLibrary();
            
            // Firebase Auth Setup
            if (window.onAuthStateChanged) {
                const loginBtn = document.getElementById('google-login-btn-lib');
                const userAvatar = document.getElementById('user-avatar-lib');
                const userIcon = document.getElementById('user-icon-lib');
                const userName = document.getElementById('user-name-lib');
                const logoutBtn = document.getElementById('logout-btn-lib');

                if (loginBtn) loginBtn.onclick = () => {
                    const provider = new window.GoogleAuthProvider();
                    window.signInWithPopup(window.firebaseAuth, provider).catch(err => console.error(err));
                };
                if (logoutBtn) logoutBtn.onclick = () => {
                    window.signOut(window.firebaseAuth).catch(err => console.error(err));
                };

                window.onAuthStateChanged(window.firebaseAuth, (user) => {
                    if (user) {
                        if (loginBtn) loginBtn.classList.add('hidden');
                        if (userAvatar) {
                            userAvatar.classList.remove('hidden');
                            if (userIcon) userIcon.src = user.photoURL || '';
                            if (userName) userName.innerText = user.displayName || 'User';
                        }
                        syncFromFirebase();
                    } else {
                        if (loginBtn) loginBtn.classList.remove('hidden');
                        if (userAvatar) userAvatar.classList.add('hidden');
                    }
                });
            }
        };

        function syncFromFirebase() {
            const user = window.firebaseAuth.currentUser;
            if (!user) return;

            const dbRef = window.firebaseRef(window.firebaseDB);
            window.firebaseGet(window.firebaseChild(dbRef, `users/${user.uid}/notes`)).then(snapshot => {
                if (!snapshot.exists()) return;

                const firebaseNotes = snapshot.val();
                let localIndex = JSON.parse(localStorage.getItem('mathnote_index') || '[]');
                if (!Array.isArray(localIndex)) localIndex = [];

                let changed = false;

                for (const id in firebaseNotes) {
                    const fbNote = firebaseNotes[id];
                    const localNoteStr = localStorage.getItem(`mathnote_note_${id}`);
                    const localNote = localNoteStr ? JSON.parse(localNoteStr) : null;

                    if (!localNote || fbNote.updatedAt > localNote.updatedAt) {
                        localStorage.setItem(`mathnote_note_${id}`, JSON.stringify(fbNote.data));
                        
                        const idx = localIndex.findIndex(e => e.id === id);
                        const entry = { 
                            id, 
                            name: fbNote.name, 
                            tags: fbNote.tags || [], 
                            updatedAt: fbNote.updatedAt,
                            headerColor: fbNote.headerColor || null
                        };
                        
                        if (idx !== -1) localIndex[idx] = entry;
                        else localIndex.push(entry);
                        
                        changed = true;
                    }
                }

                if (changed) {
                    localStorage.setItem('mathnote_index', JSON.stringify(localIndex));
                    loadLibrary(currentActiveTagId);
                }
            }).catch(err => {
                console.error("Library Sync Error:", err);
            });
        }
    </script>
    <!-- Firebase SDK (ES Module) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWPFiAdIyj2rHKrKDXMU1DP4dxYMihlYA",
            authDomain: "mathnote-86595.firebaseapp.com",
            databaseURL: "https://mathnote-86595-default-rtdb.firebaseio.com",
            projectId: "mathnote-86595",
            storageBucket: "mathnote-86595.firebasestorage.app",
            messagingSenderId: "886174524589",
            appId: "1:886174524589:web:9562bc7ccd7dc52eea1224"
        };

        const app = initializeApp(firebaseConfig);
        window.firebaseDB = getDatabase(app);
        window.firebaseAuth = getAuth(app);
        window.GoogleAuthProvider = GoogleAuthProvider;
        window.signInWithPopup = signInWithPopup;
        window.signOut = signOut;
        window.onAuthStateChanged = onAuthStateChanged;
        // DB操作用
